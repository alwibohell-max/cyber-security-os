<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — CyberShield OS</title>
<meta name="description" content="The page you are looking for does not exist on CyberShield OS.">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0a;--bg-1:#111111;--bg-2:#191919;--border:rgba(255,255,255,0.06);
  --text:#ededef;--text-2:#8e8e93;--text-3:#636366;
  --blue:#5e9eff;--red:#ff6b6b;
  --font:'DM Sans',-apple-system,sans-serif;--mono:'JetBrains Mono',monospace;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;-webkit-font-smoothing:antialiased}
.wrap{max-width:520px;text-align:center}
.badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;border:1px solid var(--border);background:var(--bg-1);font-family:var(--mono);font-size:11px;color:var(--text-3);margin-bottom:24px;text-transform:uppercase;letter-spacing:0.08em}
.dot{width:6px;height:6px;border-radius:50%;background:var(--red)}
h1{font-size:72px;font-weight:700;letter-spacing:-0.04em;line-height:1;margin-bottom:12px;background:linear-gradient(180deg,#fff 0%,var(--text-2) 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
h2{font-size:20px;font-weight:600;margin-bottom:10px;letter-spacing:-0.01em}
p{color:var(--text-2);font-size:14px;line-height:1.6;margin-bottom:24px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;border-radius:8px;border:1px solid var(--text);background:var(--text);color:var(--bg);font-size:13px;font-weight:600;text-decoration:none;transition:opacity 0.15s}
.btn:hover{opacity:0.85}
.code{font-family:var(--mono);font-size:11px;color:var(--text-3);margin-top:20px}
</style>
</head>
<body>
<div class="wrap">
  <div class="badge"><span class="dot"></span> Signal lost</div>
  <h1>404</h1>
  <h2>Page not found</h2>
  <p>The route you requested is not part of the CyberShield OS demo. It may have been moved, renamed, or never existed.</p>
  <a class="btn" href="/">Return to Command Center</a>
  <div class="code">ERR_PATH_NOT_FOUND</div>
</div>
</body>
</html>
